<!DOCTYPE html>
<html>
<head>
<title>Student Registration Form</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f6ff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  padding: 25px 35px;
  border-radius: 10px;
  width: 380px;
  box-shadow: 0 8px 16px rgba(0,0,0,0.2);
}

h2 {
  text-align: center;
  color: #2c3e50;
}

label {
  font-weight: bold;
  display: block;
  margin-top: 12px;
}

input[type="text"],
input[type="number"],
input[type="date"] {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

.gender {
  margin-top: 8px;
}

button {
  width: 100%;
  padding: 10px;
  background: #3498db;
  color: white;
  border: none;
  border-radius: 5px;
  margin-top: 20px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #2980b9;
}

.social-icons {
  text-align: center;
  margin-top: 20px;
}

.social-icons img {
  width: 35px;
  margin: 0 10px;
  cursor: pointer;
}
</style>

</head>
<body>

<div class="container">
  <h2>Student Registration</h2>

  <form id="regForm">

    <label>Name</label>
    <input type="text" id="name" required>

    <label>Age</label>
    <input type="number" id="age" required>

    <label>Gender</label>
    <div class="gender">
      <input type="radio" name="gender" value="Male"> Male
      <input type="radio" name="gender" value="Female"> Female
    </div>

    <label>Date of Birth</label>
    <input type="date" id="dob" required>

    <label>Roll Number</label>
    <input type="text" id="roll" required>

    <button type="submit">Register</button>
  </form>

  <div class="social-icons">
    <a href="https://www.facebook.com/YOUR_ID" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/124/124010.png">
    </a>

    <a href="https://www.instagram.com/YOUR_ID" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png">
    </a>
  </div>
</div>

<script>
document.getElementById("regForm").addEventListener("submit", function(e){
  e.preventDefault();

  let name = document.getElementById("name").value;
  let age = document.getElementById("age").value;
  let dob = document.getElementById("dob").value;
  let roll = document.getElementById("roll").value;
  let gender = document.querySelector('input[name="gender"]:checked');

  if(!gender){
    alert("Please select gender");
    return;
  }

  fetch("http://localhost:3000/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      name,
      age,
      gender: gender.value,
      dob,
      roll
    })
  })
  .then(res => res.json())
  .then(data => alert(data.message));
});
</script>

</body>
</html>
